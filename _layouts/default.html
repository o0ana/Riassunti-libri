<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #222;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 8% 80px 8%;
    }
    a { color: #222; text-decoration: none; }
    h1, h2, h3 { font-weight: 400; }
    
    /* Stile dei libri nella lista */
    .libro {
      border-bottom: 1px solid #eee;
    }
    .libro a {
      display: block;
      padding: 24px 0;
      transition: padding-left 0.2s ease;
    }
    .libro a:hover {
      padding-left: 12px;
      background: #fafafa;
    }
    .libro .titolo {
      display: block;
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 4px;
      color: #222;
    }
    .libro .sottotitolo {
      display: block;
      font-size: 0.95rem;
      color: #888;
    }
    .libro .autore {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      font-style: italic;
      margin-top: 6px;
    }
    .capitolo {
  margin-bottom: 80px;
}
.capitolo h2 {
  font-size: 1.8rem;
  font-weight: 400;
  border-bottom: 2px solid #333;
  padding-bottom: 8px;
  margin-top: 0;
  margin-bottom: 30px;
}
.capitolo p {
  margin: 0;
  text-align: justify;
}
    @media (max-width: 600px) {
      .container { padding: 40px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
